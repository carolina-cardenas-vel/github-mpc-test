<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p class="school-pride-tagline">School Colors: White + Lime Green</p>
    </header>

    <section id="mascots-container" aria-labelledby="mascots-heading">
      <h3 id="mascots-heading">Meet Our Mascot Squad</h3>
      <div class="mascot-grid">
        <a class="mascot-card" href="https://octodex.github.com/adventure-cat" target="_blank" rel="noopener noreferrer">
          <img src="https://octodex.github.com/images/adventure-cat.png" alt="Adventure Cat Octodex mascot" />
          <span>Adventure Cat</span>
        </a>
        <a class="mascot-card" href="https://octodex.github.com/codercat" target="_blank" rel="noopener noreferrer">
          <img src="https://octodex.github.com/images/codercat.jpg" alt="Codercat Octodex mascot" />
          <span>Codercat</span>
        </a>
        <a class="mascot-card" href="https://octodex.github.com/constructocat" target="_blank" rel="noopener noreferrer">
          <img src="https://octodex.github.com/images/constructocat2.jpg" alt="Constructocat Octodex mascot" />
          <span>Constructocat</span>
        </a>
      </div>
    </section>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <button id="download-csv-btn" type="button">Download CSV Report</button>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
